<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style type="text/css">
            *{
                box-sizing: border-box;
            }
            [class*="col-"] {
                float: left;
                width: 100%;
            }
            .row::after{
                content: "";
                clear: both;
                display: table;
            }
            body{
                font-family: sans-serif;
            }
            .topnav {
                float: left;
                width: 100%;
                overflow: hidden;
                background-color: #ccffcc;
                position: fixed;
                top: 0;
                display: none;
            }
            .topnav a{
                float: right;
                color: #ffffe6;
                text-align: center;
                padding: 15px;
                text-decoration: none;
                font-size: 20px;
                background-color:#6666ff;
                font-weight: 600;
                min-width: 12%;
            }
            .topnav a:hover {
                background-color: #e6e6ff;
                color: #6666ff;
            }
            #l{
                min-width: 0px;
                float: left;
            }
            .g54{
                height: 48px;
                width: 100%;
                float: left;
                display: none;
            }
            .b{
                text-decoration: none;
                text-align: center;
                font-size: 35px;
                padding: 95px 10px;
                background-color: red;
                display: block;
                color: aliceblue;
                font-weight: 600;
                border-radius: 20px; 
            }
            .b:hover{filter: hue-rotate(45deg)}
            .g55{
                border-left: 4px solid white;
            }
            .g55 a{
                padding: 30px;
                font-size: 30px;
                background-color: #85adad;
                width: 100%;
                float: left;
                text-align: center;
                text-decoration: none;
                display: block;
                color: white;
            }
            .g55 a:hover{
                border-left: 5px solid #52707a;
                color: #52707a;
                background-color: transparent;
                border-bottom: 2px solid #85adad;
                border-top: 2px solid #85adad;
            }
            .b1{background-color: #00ff00;}
            .b2{background-color: #ffcc66;}
            .b3{background-color: #3366ff;}
            .b4{background-color: #ff4d4d;}
            .a1100{display: none}
            @media only screen and (min-width: 768px){
                .col-1 {width: 8.33%;}
                .col-2 {width: 16.66%;}
                .col-3 {width: 25%;}
                .col-4 {width: 33.33%;}
                .col-5 {width: 41.66%;}
                .col-6 {width: 50%;}
                .col-7 {width: 58.33%;}
                .col-8 {width: 66.66%;}
                .col-9 {width: 75%;}
                .col-10 {width: 83.33%;}
                .col-11 {width: 91.66%;}
                .col-12 {width: 100%;}
                .topnav{display: block;}
                .g54{display: block;}
                .b{border-radius: 0px; border-right: 10px solid white;border-bottom: 10px solid white;}
                .b1{border-top-left-radius: 30px; background-color: #00ff00;}
                .b2{border-top-right-radius: 30px; border-right: 0px solid red; background-color: #ffcc66;}
                .b3{border-bottom-left-radius: 30px; border-bottom: 0px solid red; background-color: #3366ff; display: inline-block;}
                .b4{border-bottom-right-radius: 30px;border-right: 0px solid red;border-bottom: 0px solid red; background-color: #ff4d4d;}
                .a1100{display: block;width: 100%;height:105px;background-color: transparent;}
                
            }
        </style>
    </head>
    <body>
        <div class="header">
            <div class="topnav">
                <a href="#top" id="l"><img src="/images/logo.png" style="height:20px;width:20px;"/></a>
                <a href="#">QnA</a>
                <a href="#">Downloads</a>
                <a href="#">Projects</a>
                <a href="#">Build</a>
                <a href="#">Learn</a>
                <a href="#">Home</a>
            </div>
            <div class="g54"></div>
        </div>
        <div class="main">
            <div class="row">
                <div class="col-8">
                    <div class="row">
                        <a href="#" class="b b1 col-6">Web Dev</a>
                        <a href="#" class="b b2 col-6">App Dev</a>
                    </div>
                    <div class="row">
                        <a href="#" class="b b3 col-6">Game Dev</a>
                        <a href="#" class="b b4 col-6">M L</a>
                    </div>
                    <div class="a1100"></div>
                </div>
                <div class="col-4 g55">
                    <a href="#">HTML</a>
                    <a href="#">CSS</a>
                    <a href="#">JavaScript</a>
                    <a href="#">Python</a>
                    <a href="#">Kotlin</a>
                    <a href="#">ALL</a>
                </div>
            </div>
        </div>
    </body>
</html>
