<!DOCTYPE html>
<html>
	<head>
		<title>Under Construction</title>
		<style>
			body{
				background:#000000;
			}
			.container-load{
				transform: translate(-50%,80%);
				width:200px;
				height:200px;
				border-radius:50%;
				position:relative;
				top:50%;
				left:50%;
				animation:colorize 1s ease infinite;
				overflow:hidden;
			}
			.loader{
				width:calc(100% - 12px);
				height:calc(100% - 12px);
				position:absolute;
				border:5px solid #000;
				border-top:10px solid #09f;
				border-radius:50%;
				animation-fill-mode:forwards;
				animation:rotate 5s 0.5s linear infinite;
			}
			@keyframes colorize{
				20%{ filter:hue-rotate(72deg);}
				40%{ filter:hue-rotate(144deg);}
				60%{ filter:hue-rotate(216deg);}
				80%{ filter:hue-rotate(288deg);}
				100%{ filter:hue-rotate(360deg);}
			}
			@keyframes rotate{
				0%{ transform: rotate(0deg);}
				50%{ transform: rotate(210deg);}
				100%{ transform: rotate(360deg);}
			}
		</style>
	</head>
	<body>
		<div class="container-load">
			<div class="loader">
				<div class="loader">
					<div class="loader">
						<div class="loader">
							<div class="loader">
								<div class="loader">
									<div class="loader">
										<div class="loader">
											<div class="loader">
												<div class="loader">
													<div class="loader">
													</div>
												</div>
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
