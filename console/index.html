<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../resources/prism.css" />
        <style type="text/css">
            *{
                box-sizing: border-box;
            }
            body{
                font-family: sans-serif;
            }
            [class*="col-"] {
                float: left;
                width: 100%;
            }
            .row::after{
                content: "";
                clear: both;
                display: table;
            }
            @media only screen and (min-width: 768px){
                .col-1 {width: 8.33%;}
                .col-2 {width: 16.66%;}
                .col-3 {width: 25%;}
                .col-4 {width: 33.33%;}
                .col-5 {width: 41.66%;}
                .col-6 {width: 50%;}
                .col-7 {width: 58.33%;}
                .col-8 {width: 66.66%;}
                .col-9 {width: 75%;}
                .col-10 {width: 83.33%;}
                .col-11 {width: 91.66%;}
                .col-12 {width: 100%;}
            }
        </style>
    </head>
    <body>
        <div id="big-title"></div>
        <div class="main">
            <div id="title"></div>
            <div id="text"></div>
            <div id="code"></div>
            <div id="question"></div>
            <div id="submit">
                <button id="submit-btn">Submit</button>
            </div>
            <div id="buttons">
                <button id="prev">Previous</button>
                <button id="nxt">Next</button>
            </div>
        </div>
        <script src="../resources/cookie.js"></script>
        <script>
            var idds, galaxy,lesson;
            function main(){
                let c=checkCookie("pageID");
                if(c){
                    if(c.length==8){
                        idds=c.split(" "); 
                    }else{
                        window.location.assign("..index.html");
                    }
                }else{
                    window.location.assign("..index.html");
                }
                galaxy="_"+idds[1];
                lesson=parseInt(idds[2]);
            }
        </script>
    </body>
</html>
