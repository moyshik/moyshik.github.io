<head>
    <style>
        body{
            background-color: #6666ff;
        }
        .p{
            float: left;
            height: 200px;
            width: 200px;
            border-radius: 0px;
            background-color: white;
        }
        .p1{
            border-top-left-radius: 20px;
            border-right: 20px solid #6666ff;
            border-bottom: 20px solid #6666ff;
        }
        .p2{
            border-top-right-radius:20px;
            border-bottom: 20px solid #6666ff;
        }
        .p3{
            border-bottom-left-radius: 20px;
            border-right: 20px solid #6666ff;
        }
        .p4{
            border-bottom-right-radius: 20px;
        }
    </style>
</head>
<body>
    <div style="border:60px solid #6666ff;">
    <div style="width: 420px; ">
    <div class="p p1"></div>
    <div class="p p2"></div>
    </div>
    <div style="width: 420px;">
    <div class="p p3"></div>
    <div class="p p4"></div>
    </div>
    </div>
</body>
